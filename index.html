<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Démineur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💣</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
  <div id="top-controls">
    <button id="openOptions">⚙️</button>
    <button id="invertClick" title="Inverser clics">⇄</button>
    <button id="zoomIn">➕</button>
    <button id="zoomOut">➖</button>
  </div>
  <div id="top-bar">
    <div class="counter" id="mineCounter">000</div>
    <button id="smiley">🙂</button>
    <div class="counter" id="timeCounter">000</div>
  </div>

  <div id="presets">
    <button data-mines="10">10</button>
    <button data-mines="25">25</button>
    <button data-mines="50">50</button>
    <button data-mines="100">100</button>
    <button data-mines="250">250</button>
    <button data-mines="500">500</button>
    <button data-mines="999">999</button>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>
</div>

<div id="optionsModal" class="modal hidden">
  <div class="modal-content">
    <h2>Options</h2>

    <fieldset>
      <legend>Son</legend>
      <label><input type="checkbox" id="soundEnabled"> Activer le son</label><br>
      Volume <input type="range" id="soundVolume" min="0" max="100">
    </fieldset>

    <fieldset>
      <legend>Grille personnalisée</legend>
      <label>Lignes <input type="number" id="optRows" value="16"></label>
      <label>Colonnes <input type="number" id="optCols" value="16"></label>
      <label>Bombes <input type="number" id="optMines" value="40"></label>
      <button id="startCustom">Démarrer</button>
    </fieldset>

    <fieldset>
      <legend>Gestes mobiles</legend>
      <label><input type="radio" name="gestures" value="profile1"> Tap / Double tap / Triple tap</label><br>
      <label><input type="radio" name="gestures" value="profile2"> Tap / Appui long / Double tap</label>
    </fieldset>

    <button id="closeOptions">Fermer</button>
  </div>
</div>

<div id="winModal" class="modal hidden">
  <div class="modal-content">
    <h2>Bravo !</h2>
    <button id="closeWin">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
